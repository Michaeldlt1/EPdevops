version: '3.9'

services:

  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  web:
    build: .

    container_name: flask_app

    depends_on:
      - db

    environment:
      APP_NAME: Inventario Flask
      APP_VERSION: 1.0.0

      DB_NAME: inventario
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432

    ports:
      - "5000:5000"

volumes:
  postgres_data: